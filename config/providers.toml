[claude]
bin = "claude"
model = "opus-4.8"
max_concurrency = 2
exhausted_patterns = ["rate limit", "quota exceeded", "usage limit"]
cooldown = { kind = "window", hours = 5, weekly = true }
consecutive_failure_threshold = 3
consecutive_failure_cooldown_seconds = 300

[claude.capabilities]
non_interactive = true
json_output = true
json_schema_output = true
model_pinning = true
supports_no_attribution = true
native_resume = true
native_sandbox = false

[codex]
bin = "codex"
model = "gpt-5.5"
max_concurrency = 2
exhausted_patterns = ["rate limit", "quota", "usage limit exceeded"]
cooldown = { kind = "window", hours = 5, weekly = true }
consecutive_failure_threshold = 3
consecutive_failure_cooldown_seconds = 300

[codex.capabilities]
non_interactive = true
json_output = true
json_schema_output = true
model_pinning = true
supports_no_attribution = false
native_resume = true
native_sandbox = true

[cursor]
bin = "cursor-agent"
model = "auto"
max_concurrency = 2
exhausted_patterns = ["quota", "limit reached"]
cooldown = { kind = "fixed", seconds = 86400 }
consecutive_failure_threshold = 3
consecutive_failure_cooldown_seconds = 300

[cursor.capabilities]
non_interactive = true
json_output = true
json_schema_output = false
model_pinning = true
supports_no_attribution = false
native_resume = true
native_sandbox = false

[mock]
bin = "mock"
model = "mock-v1"
max_concurrency = 1
exhausted_patterns = ["mock exhausted"]
cooldown = { kind = "window", hours = 1, weekly = false }
consecutive_failure_threshold = 2
consecutive_failure_cooldown_seconds = 60

[mock.capabilities]
non_interactive = true
json_output = true
json_schema_output = true
model_pinning = true
supports_no_attribution = true
native_resume = false
native_sandbox = true
known_limitations = ["No external CLI — deterministic dry-run only"]
