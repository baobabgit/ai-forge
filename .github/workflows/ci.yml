name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Format
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy --strict src/

      - name: Security
        run: uv run bandit -r src/

      - name: Test
        run: uv run pytest -x --cov=src --cov-fail-under=95
